services:
  app:
    build: .
    container_name: hoster_app
    restart: unless-stopped
    volumes:
      - .:/var/www
    networks:
      - hoster

  nginx:
    image: nginx:alpine
    container_name: hoster_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - hoster

  mysql:
    image: mysql:8.0
    container_name: hoster_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-hoster}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-hoster}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hoster

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: hoster_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USERNAME:-hoster}
      PMA_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      - mysql
    networks:
      - hoster

networks:
  hoster:
    driver: bridge

volumes:
  mysql_data:
